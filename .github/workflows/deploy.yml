# Generic Next.js deploy workflow.
# Push to main -> build -> push to GHCR -> trigger Coolify deploy.
# NEXT_PUBLIC_* (public client config) passed as build-args from repo VARIABLES.
on:
  push:
    branches: [main]
  workflow_dispatch:

name: Build, Push & Deploy

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tags.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
      - id: tags
        run: |
          repo_lc="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          sha="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "latest=ghcr.io/${repo_lc}:latest" >> "$GITHUB_OUTPUT"
          echo "sha=ghcr.io/${repo_lc}:${sha}" >> "$GITHUB_OUTPUT"
          echo "Building: ghcr.io/${repo_lc}:latest (+ :${sha})"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.latest }}
            ${{ steps.tags.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy the freshly built image
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -e
          echo "Deploying ${{ needs.build-and-push.outputs.image }} via Coolify..."
          code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST \
            "${COOLIFY_URL}/api/v1/deploy" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\":\"${COOLIFY_APP_UUID}\"}")
          echo "Coolify responded HTTP ${code}:"
          cat /tmp/resp; echo
          if [ "$code" != "200" ]; then echo "::error::Coolify deploy failed (HTTP ${code})"; exit 1; fi
          echo "Deployment queued."
